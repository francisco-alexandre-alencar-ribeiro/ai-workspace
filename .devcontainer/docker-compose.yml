services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - shared-network
    # ── GPU support (NVIDIA) — uncomment if you have the NVIDIA Container Toolkit ─
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - shared-network
    depends_on:
      ollama:
        condition: service_healthy

  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_MAJOR: ${NODE_MAJOR:-20}
    image: ai-workspace-devcontainer
    depends_on:
      - ollama

    volumes:
      # Project workspace
      - ../workspace:/workspace:z
      # Persist shell history and uv cache across rebuilds
      - vscode:/home/vscode/
      # Forward host SSH agent so git operations work without baking keys into the image
      - type: bind
        source: ${SSH_AUTH_SOCK:-/dev/null}
        target: /ssh-agent
        read_only: true

    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}

    # Keep the container alive for VS Code to attach
    command: sleep infinity

    # ── Security hardening ────────────────────────────────────────────────────
    user: vscode
    read_only: false          # dev containers need write access; tighten per project
    security_opt:
      - no-new-privileges:true  # prevents privilege escalation via setuid binaries
    cap_drop:
      - ALL                    # drop every Linux capability...
    cap_add:
      - CHOWN                  # ...then add back only what's needed for dev work
      - SETUID
      - SETGID
      - DAC_OVERRIDE

    # ── Resource limits (adjust to your machine) ──────────────────────────────
    deploy:
      resources:
        limits:
          memory: ${DEVCONTAINER_MEMORY_LIMIT:-8g}
          cpus: "${DEVCONTAINER_CPU_LIMIT:-4}"
        reservations:
          memory: ${DEVCONTAINER_MEMORY_RESERVE:-512m}
          cpus: "${DEVCONTAINER_CPU_RESERVE:-0.5}"

    # ── Networking ────────────────────────────────────────────────────────────
    networks:
      - shared-network

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  vscode:
    name: vscode
  ollama-models:
    name: ollama-models
  open-webui-data:
    name: open-webui-data

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  shared-network:
    external: true
    name: shared-network
